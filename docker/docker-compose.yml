version: '3.8'

services:
  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=file:/app/data/mountain.db
      - JWT_SECRET=mountain-music-dev-jwt-secret-2024
      - NEXTAUTH_SECRET=mountain-music-nextauth-secret-2024
      - NODE_ENV=production
      - NEXT_PUBLIC_SITE_URL=http://192.168.31.171:3000
    volumes:
      - mountain_data:/app/data
      - mountain_uploads:/app/public/uploads
      - ./init.sh:/app/init.sh
    restart: unless-stopped

volumes:
  mountain_data:
  mountain_uploads:
