<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>属于我的时间 · 歌词时钟</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;color:#fff;font-family:'PingFang SC','Microsoft YaHei',sans-serif;overflow:hidden;height:100vh;display:flex;align-items:center;justify-content:center;-webkit-user-select:none;user-select:none}
#app{position:relative;width:100vw;height:100vh;overflow:hidden}
 #app::before{content:'';position:fixed;top:0;left:0;right:0;bottom:0;background:url('/bg-city.jpg') center/cover no-repeat;opacity:0.1;z-index:1;pointer-events:none}
#clockCanvas{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);z-index:10;pointer-events:none;border-radius:50%}
#controls{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:20;display:flex;align-items:center;gap:16px;background:rgba(10,10,15,0.8);backdrop-filter:blur(8px);padding:8px 18px;border-radius:12px;border:1px solid rgba(255,255,255,0.06)}
#controls button{background:rgba(139,92,246,0.2);border:1px solid rgba(139,92,246,0.3);color:#c8b8ff;width:36px;height:36px;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center;transition:all 0.2s}
#controls button:hover{background:rgba(139,92,246,0.4)}
#controls .time{font-size:12px;color:#666;tabular-nums;min-width:80px;text-align:center}
#controls input[type=range]{width:120px;height:3px;-webkit-appearance:none;background:rgba(139,92,246,0.2);border-radius:2px;outline:none}
#controls input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:10px;height:10px;border-radius:50%;background:#8b5cf6;cursor:pointer}
#controls label{color:#555;font-size:11px}
#statusBar{position:fixed;top:12px;left:50%;transform:translateX(-50%);z-index:20;font-size:11px;color:#555;background:rgba(10,10,15,0.5);backdrop-filter:blur(4px);padding:4px 12px;border-radius:6px;border:1px solid rgba(255,255,255,0.03);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:80vw}
#statusBar span{color:#8b5cf6}
</style>
</head>
<body>
<div id="app">
  <canvas id="clockCanvas" width="500" height="500"></canvas>
  <div id="statusBar" title="属于我的时间"><span>●</span> 点击播放开始</div>
  <div id="controls">
    <button id="playBtn" onclick="togglePlay()">▶</button>
    <div class="time"><span id="curTime">0:00</span> / <span id="totTime">0:00</span></div>
    <input type="range" id="seekBar" min="0" max="100" value="0" oninput="seekTo(this.value)">
    <label>3x</label>
  </div>
</div>

<audio id="audioPlayer" preload="auto"></audio>

<script>
// ─── Full Lyrics (LRC) ───
const LRC_TEXT = `[00:04.032]秒针在滴答耳边回响
[00:07.460]对面关了最后一盏灯光
[00:11.232]午夜问着未来的模样
[00:14.070]该怎么编织属于自己的网
[00:31.778]我把心事藏进了耳机里
[00:33.735]让旋律陪我走过夜晚的安静
[00:35.403]那些没说出口，做的决心
[00:37.400]还有没完成的约定
[00:39.255]我知道这条路没有捷径
[00:41.519]有太多时候只能靠自己证明
[00:43.141]他们看不到我熬过的凌晨
[00:44.886]也不知道我咽下多少声音
[00:47.333]我曾经也怀疑过未来
[00:49.395]是不是开始远远离开
[00:51.165]可是每一次快要放弃相信
[00:53.784]总有个声音，不断给我信心
[01:01.804]如果时间能回答所有问题
[01:04.135]请一定要告诉自己
[01:06.497]经历过的那些孤寂
[01:12.603]最后都会成为勇气
[01:16.106]这是属于我的时间
[01:19.439]写满还没实现的梦，没圆
[01:23.241]哪怕世界太遥远，太多偏见
[01:27.643]不理会，我视而不见
[01:30.801]你们又不是我的未来
[01:32.480]从我世界离开，滚开
[01:34.441]I don't wanna lose my way
[01:36.268]I just wanna be okay
[01:38.113]把冷眼全都推开
[01:40.104]把遗憾留给昨天
[01:41.984]这是属于我的时间
[01:43.770]I build my own empire, following my plan.
[01:47.451]我走过没人看见的路
[01:49.266]也习惯了一个人领悟
[01:51.179]手机里保存那些记录
[01:52.794]提醒我别忘最初的温度
[01:54.789]别问我为什么总在坚持
[01:56.432]因为我不甘心这样认输
[01:58.247]不是每颗种子都会开花
[02:00.106]但每颗种子都努力破土
[02:02.269]我想带着家人的期待
[02:03.684]带着朋友给我的信赖
[02:05.548]穿过那些冷眼和无奈
[02:07.388]证明曾经的梦没有失败
[02:09.213]I keep moving, day by day
[02:10.831]把昨天全部都 rewrite
[02:12.667]未来不会自动到来
[02:14.372]所以我要自己 make my way
[02:16.442]这是属于我的时间
[02:18.638]写满对未来的期待
[02:21.859]已不是迷失的少年
[02:25.469]用尽全力编织着舞台
[02:29.442]I know we'll be alright
[02:31.683]Even in the darkest night
[02:33.896]就算我不是天空的star
[02:36.790]我也要让自己发出光明
[02:41.322]这是属于我的时间
[02:44.188]不会被任何人替代
[02:48.058]因为我用曾经的青春
[02:51.722]认真写下一段我的未来
[02:54.497]Our time, our story
[02:56.310]从黑夜走向黎明
[02:59.777]这一路的所有痕迹
[03:02.820]都是证明存在的肯定`

function parseLRC(text) {
  return text.split('\n').filter(l=>l.trim()).map(line=>{
    const m = line.match(/\[(\d+):(\d+(?:\.\d+)?)\]\s*(.*)/)
    if (m) return { time: parseInt(m[1])*60 + parseFloat(m[2]), text: m[3].trim() }
    return null
  }).filter(l=>l && l.text)
}

const lyrics = parseLRC(LRC_TEXT)
const canvas = document.getElementById('clockCanvas')
const ctx = canvas.getContext('2d')
const statusEl = document.getElementById('statusBar')
const audio = document.getElementById('audioPlayer')
const playBtn = document.getElementById('playBtn')
const seekBar = document.getElementById('seekBar')
const curTimeEl = document.getElementById('curTime')
const totTimeEl = document.getElementById('totTime')

// Audio source
audio.src = '/songs/my-time.wav'

// ─── Particle System ───
class CharParticle {
  constructor(char, lineIdx) {
    this.char = char
    this.lineIdx = lineIdx
    this.baseX = (Math.random() - 0.5) * 2 * (window.innerWidth * 0.42)
    this.baseY = (Math.random() - 0.5) * 2 * (window.innerHeight * 0.38)
    this.x = this.baseX; this.y = this.baseY
    this.opacity = 0.06; this.color = '#3a3a5a'; this.fontSize = 13
    this.state = 'future'; this.isStirred = false
  }
}

let particles = [], currentLineIdx = -1, isPlaying = false
let lastCS = -1, prevStirTime = 0, speed3x = false

function buildParticles() {
  particles = []
  lyrics.forEach((line, li) => {
    for (const ch of line.text) {
      if (ch === ' ') continue
      particles.push(new CharParticle(ch, li))
    }
  })
}
buildParticles()

function isProtected(li) { return li === currentLineIdx || li === currentLineIdx - 1 || li === currentLineIdx + 1 }
function isFuture(li, t) { return lyrics[li].time > t }
function hasPlayed(li, t) { return lyrics[li].time + 2 <= t || (lyrics[li].time <= t && li < currentLineIdx) }

function updateParticles(time) {
  particles.forEach(p => {
    const li = p.lineIdx
    const isC = li === currentLineIdx, isN = li === currentLineIdx - 1 || li === currentLineIdx + 1
    const isF = isFuture(li, time), isP = hasPlayed(li, time)
    if (isC) { p.isStirred=false; p.state='current'; p.opacity+=(1-p.opacity)*0.08; p.color='#c8b8ff'; p.fontSize=16 }
    else if (isN) { p.isStirred=false; p.state='near'; p.opacity+=(0.5-p.opacity)*0.08; p.color='#8a7aaa'; p.fontSize=14 }
    else if (isF) { p.state='future'; p.opacity+=(0.5-p.opacity)*0.08; p.color='#7a7a8a'; p.fontSize=13 }
    else if (p.isStirred) { p.state='stirred'; p.opacity+=(0.5-p.opacity)*0.08; p.color='#6a5a7a'; p.fontSize=12 }
    else if (isP) { p.state='played'; p.opacity+=(0.5-p.opacity)*0.08; p.color='#7a6a8a'; p.fontSize=12 }
    p.x += (p.baseX - p.x) * 0.06
    p.y += (p.baseY - p.y) * 0.06
  })
}

function stirPlayed(time) {
  if (time - prevStirTime < 0.05) return
  prevStirTime = time
  particles.forEach(p => {
    if (isProtected(p.lineIdx) || !hasPlayed(p.lineIdx, time) || isFuture(p.lineIdx, time) || time - lyrics[p.lineIdx].time < 2) return
    p.isStirred = true
    p.baseX = (Math.random() - 0.5) * 2 * (window.innerWidth * 0.44)
    p.baseY = (Math.random() - 0.5) * 2 * (window.innerHeight * 0.41)
  })
}

function drawScene(time) {
  canvas.width = window.innerWidth; canvas.height = window.innerHeight
  ctx.clearRect(0, 0, canvas.width, canvas.height)
  ctx.save(); ctx.translate(canvas.width/2, canvas.height/2)
  
  particles.forEach(p => {
    ctx.save(); ctx.translate(p.x, p.y)
    ctx.globalAlpha = Math.max(0.02, p.opacity)
    ctx.fillStyle = p.color
    ctx.font = `${p.fontSize}px "PingFang SC","Microsoft YaHei",sans-serif`
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle'
    if (p.state === 'current') { ctx.shadowColor='rgba(139,92,246,0.5)'; ctx.shadowBlur=16 }
    else if (p.state === 'near') { ctx.shadowColor='rgba(139,92,246,0.15)'; ctx.shadowBlur=6 }
    ctx.fillText(p.char, 0, 0)
    ctx.restore()
  })
  ctx.globalAlpha = 1; ctx.shadowBlur = 0
  
  // Clock
  // Full-screen clock hands (no dial)
  const maxR = Math.min(canvas.width, canvas.height) * 0.48
  const hA = (time % 43200 / 43200) * Math.PI * 2 - Math.PI / 2
  const mA = (time % 3600 / 3600) * Math.PI * 2 - Math.PI / 2
  const sA = (time % 60 / 60) * Math.PI * 2 - Math.PI / 2
  const cs = time % 1, csA = cs * Math.PI * 2 - Math.PI / 2
  // Stir particles near the centisecond hand's sweep path
  const handAngle = csA
  const stirThreshold = 0.12 // ~7 degree arc
  particles.forEach(p => {
    if (isProtected(p.lineIdx) || !hasPlayed(p.lineIdx, time) || isFuture(p.lineIdx, time) || time - lyrics[p.lineIdx].time < 2) return
    // Check if particle is near the centisecond hand's angular position
    const particleAngle = Math.atan2(p.y, p.x)
    let diff = handAngle - particleAngle
    // Normalize to [-PI, PI]
    while (diff > Math.PI) diff -= Math.PI * 2
    while (diff < -Math.PI) diff += Math.PI * 2
    if (Math.abs(diff) < stirThreshold) {
      p.isStirred = true
      p.baseX = (Math.random() - 0.5) * 2 * (window.innerWidth * 0.44)
      p.baseY = (Math.random() - 0.5) * 2 * (window.innerHeight * 0.41)
    }
  })

  const hands = [
    { a: hA, len: maxR * 0.65, w: 8, c: 'rgba(180,140,255,0.8)', glow: true },
    { a: mA, len: maxR * 0.78, w: 5, c: 'rgba(140,180,255,0.8)', glow: true },
    { a: sA, len: maxR * 0.88, w: 2.5, c: 'rgba(100,200,255,0.8)', glow: true },
    { a: csA, len: maxR * 0.95, w: 1.5, c: 'rgba(255,100,255,0.8)', glow: true },
  ]
  const glowColors = ['rgba(180,140,255,0.5)', 'rgba(140,180,255,0.4)', 'rgba(100,200,255,0.3)', 'rgba(255,100,255,0.5)']
  hands.forEach((h, hi) => {
    const ex = Math.cos(h.a) * h.len, ey = Math.sin(h.a) * h.len
    ctx.shadowColor = glowColors[hi]
    ctx.shadowBlur = 20 + hi * 5
    ctx.strokeStyle = h.c; ctx.lineWidth = h.w; ctx.lineCap = 'round'
    ctx.beginPath(); ctx.moveTo(0, 0); ctx.lineTo(ex, ey); ctx.stroke(); ctx.shadowBlur = 0
  })
  ctx.restore()
  
  // Draw current lyrics text at bottom center
  if (currentLineIdx >= 0 && lyrics[currentLineIdx]) {
    const txt = lyrics[currentLineIdx].text
    ctx.save()
    ctx.shadowColor = 'rgba(139,92,246,0.8)'
    ctx.shadowBlur = 24
    ctx.fillStyle = '#d8c8ff'
    ctx.font = 'bold 24px "PingFang SC","Microsoft YaHei",sans-serif'
    ctx.textAlign = 'center'
    ctx.textBaseline = 'bottom'
    ctx.globalAlpha = 1
    // Semi-transparent background bar
    ctx.shadowBlur = 0
    ctx.fillStyle = 'rgba(10,10,15,0.5)'
    const tw = ctx.measureText(txt).width
    const bx = canvas.width/2 - tw/2 - 16
    const by = window.innerHeight * 0.20 - 32
    ctx.roundRect ? ctx.roundRect(bx, by, tw + 32, 42, 8) : ctx.fillRect(bx, by, tw + 32, 42)
    ctx.fill()
    // Text on top
    ctx.shadowColor = 'rgba(139,92,246,0.6)'
    ctx.shadowBlur = 16
    ctx.fillStyle = '#c8b8ff'
    ctx.fillText(txt, canvas.width/2, window.innerHeight * 0.20)
    ctx.restore()
  }
}

function formatTime(s){const m=Math.floor(s/60);return m+':'+String(Math.floor(s%60)).padStart(2,'0')}

function updateUI(time){
  curTimeEl.textContent=formatTime(time)
  seekBar.value=audio.duration? (time/audio.duration*100):0
}

// Audio sync
audio.addEventListener('timeupdate', ()=>{
  let t = audio.currentTime
  if(speed3x) t = audio.currentTime * 3 // 3x for demo: audio plays at 1x, display at 3x
  
  // Find current line
  let newIdx=-1
  for(let i=lyrics.length-1;i>=0;i--){if(t>=lyrics[i].time&&t<(lyrics[i+1]?.time||Infinity)){newIdx=i;break}}
  if(t>=lyrics[lyrics.length-1].time)newIdx=lyrics.length-1
  if(newIdx!==currentLineIdx){currentLineIdx=newIdx}
  
  updateParticles(t); drawScene(t)
  updateUI(audio.currentTime)
  statusEl.innerHTML=newIdx>=0?`<span>♪</span> ${lyrics[newIdx].text.substring(0,30)}...`:'<span>●</span> 属于我的时间'
})

audio.addEventListener('loadedmetadata',()=>{
  totTimeEl.textContent=formatTime(audio.duration)
})

audio.addEventListener('ended',()=>{isPlaying=false;playBtn.textContent='▶'})

function togglePlay(){
  if(isPlaying){audio.pause();playBtn.textContent='▶'}
  else{
    audio.play().then(()=>{
      playBtn.textContent='⏸'
      if(!isPlaying)requestAnimationFrame(animateLoop)
    }).catch(e=>{
      // Fallback: use oscillator for demo without server
      statusEl.innerHTML='<span>●</span> 点击画面以启动音频'
    })
  }
  isPlaying=!isPlaying; statusEl.innerHTML='<span>♪</span> 属于我的时间'
}

function seekTo(val){
  if(audio.duration){audio.currentTime=val/100*audio.duration}
}

// Background animation loop (runs even when audio is being weird)
let animTime = 0
function animateLoop(t){
  if(isPlaying){
    // Update lyrics position every frame from audio time
    const ct = audio.currentTime
    let newIdx=-1
    for(let i=lyrics.length-1;i>=0;i--){if(ct>=lyrics[i].time&&ct<(lyrics[i+1]?.time||Infinity)){newIdx=i;break}}
    if(ct>=lyrics[lyrics.length-1].time)newIdx=lyrics.length-1
    if(newIdx!==currentLineIdx){currentLineIdx=newIdx}
    updateParticles(ct)
    drawScene(ct)
    updateUI(ct)
    statusEl.innerHTML=newIdx>=0?`♪ ${lyrics[newIdx].text.substring(0,30)}...`:'● 属于我的时间'
  }
  requestAnimationFrame(animateLoop)
}

// Start background animation
animateLoop(0)

// Handle initial play (browser autoplay policy)
document.addEventListener('click', ()=>{
  if(!isPlaying && audio.paused){
    audio.play().then(()=>{
      playBtn.textContent='⏸'; isPlaying=true
      totTimeEl.textContent=formatTime(audio.duration||185)
      statusEl.innerHTML='<span>♪</span> 属于我的时间'
    }).catch(()=>{})
  }
}, {once:true})

// Window resize
window.addEventListener('resize', ()=>{
  particles.forEach(p=>{
    if(!p.isStirred && p.state!=='stirred'){
      p.baseX = (Math.random()-0.5)*2*(window.innerWidth*0.42)
      p.baseY = (Math.random()-0.5)*2*(window.innerHeight*0.38)
    }
  })
})
</script>
</body>
</html>
